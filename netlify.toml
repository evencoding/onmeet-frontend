[build]
  command = "pnpm run build"
  publish = "dist/spa"

[[redirects]]
  from = "/api/*"
  to = "https://api.onmeet.cloud/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/auth/*"
  to = "https://api.onmeet.cloud/auth/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/notification/*"
  to = "https://api.onmeet.cloud/notification/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data: blob:; font-src 'self'; connect-src 'self' https://api.onmeet.cloud wss://*.livekit.cloud https://*.sentry.io https://*.googleapis.com https://*.google-analytics.com; media-src 'self' blob:; worker-src 'self' blob:; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
